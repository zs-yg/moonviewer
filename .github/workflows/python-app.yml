name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest
    - name: Compile with Nuitka
      run: |
        python -m nuitka --standalone --remove-output  --jobs=2 --lto=yes --output-filename=MoonViewer.exe --windows-console-mode=disable --enable-plugin=pyside6 --output-dir=dist main.py
    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: moonviewer-executable
        path: dist/MoonViewer.exe
        if-no-files-found: error
